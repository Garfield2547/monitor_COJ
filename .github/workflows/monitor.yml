name: Website Telegram Monitor

on:
  schedule:
    - cron: '0 */5 * * *' # รันทุกๆ 5 ชั่วโมง
  workflow_dispatch:      # ปุ่มสำหรับกดรันเองเพื่อทดสอบ

permissions:
  contents: write         # สำคัญ: เพื่อให้บอท Commit ไฟล์ last_update.txt กลับเข้าคลังได้

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Save State
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add last_update.txt
          git diff-index --quiet HEAD || (git commit -m "Update last state" && git push)